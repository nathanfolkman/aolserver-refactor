# Regression: build AOLserver and run full TLS h2spec against tests/h2test/minimal.tcl.
# See tests/h2test/run-h2spec.sh and README.md (HTTP/2 section).

name: h2spec

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  tls-h2spec:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build build-essential curl openssl libssl-dev zlib1g-dev

      - name: Configure (no nsjs/V8 — faster CI)
        # Link against distro OpenSSL 3.x; skip building openssl_ep (avoids fragile source builds on runners).
        run: cmake -S . -B build -G Ninja -DNS_WITH_V8=OFF -DNS_USE_SYSTEM_OPENSSL=ON

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Install h2spec
        run: |
          curl -fsSL https://github.com/summerwind/h2spec/releases/download/v2.6.0/h2spec_linux_amd64.tar.gz | tar xz
          sudo install -m755 h2spec /usr/local/bin/

      - name: Run h2spec
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/build/nsd:${{ github.workspace }}/build/nsthread:${{ github.workspace }}/build/deps/install/lib
          NS_TCL_LIBRARY: ${{ github.workspace }}/build/deps/install/lib/tcl8.6
          H2SPEC_TIMEOUT: "120"
          H2SPEC_STARTUP_SLEEP: "15"
        run: tests/h2test/run-h2spec.sh --start-nsd
